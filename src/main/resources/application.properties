spring.application.name=user-service

#spring data jpa
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate

server.port=8080

# Kafka Broker
spring.kafka.bootstrap-servers=${KAFKA_SERVER}

# Consumer Configuration
spring.kafka.consumer.group-id=order-group
spring.kafka.consumer.auto-offset-reset=earliest

# Deserializers
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.app.todo.user.utility.UserCreationEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=com.app.todo.user.utility